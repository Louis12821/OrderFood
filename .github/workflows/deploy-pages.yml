name: Deploy to GitHub Pages

on:
  # main 分支有更新時自動部署
  push:
    branches: [main]
  # 也允許在 Actions 頁面手動觸發
  workflow_dispatch:

# 授予部署 Pages 所需的權限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一時間只跑一個部署，新的會取代排隊中的舊的
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # 整個專案根目錄就是靜態網站
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
